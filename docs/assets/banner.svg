<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-label="Supply Chain Control Tower">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0B5A53"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <style>
      .title { font: 700 38px "Segoe UI", system-ui, sans-serif; fill: #ffffff; }
      .subtitle { font: 500 17px "Segoe UI", system-ui, sans-serif; fill: #CCFBF1; letter-spacing: .3px; }
      .tag { font: 600 12px "Segoe UI", system-ui, sans-serif; fill: #0B5A53; }
      .line { fill: none; stroke: #FBBF24; stroke-width: 3; stroke-linecap: round;
              stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: draw 3s ease forwards; }
      .bar { fill: url(#amber); opacity: .92; animation: rise 1.1s ease both; transform-box: fill-box; transform-origin: bottom; }
      .dot { fill: #FBBF24; animation: pulse 2.2s ease-in-out infinite; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes rise { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: .92; } }
      @keyframes pulse { 0%,100% { r: 5; opacity: 1; } 50% { r: 8; opacity: .55; } }
    </style>
  </defs>

  <rect width="1200" height="240" rx="18" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.06">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
  </g>

  <!-- animated demand chart motif (right side) -->
  <g transform="translate(720,40)">
    <g>
      <rect class="bar" x="0"   y="120" width="22" height="50"  style="animation-delay:.1s"/>
      <rect class="bar" x="34"  y="96"  width="22" height="74"  style="animation-delay:.2s"/>
      <rect class="bar" x="68"  y="108" width="22" height="62"  style="animation-delay:.3s"/>
      <rect class="bar" x="102" y="72"  width="22" height="98"  style="animation-delay:.4s"/>
      <rect class="bar" x="136" y="84"  width="22" height="86"  style="animation-delay:.5s"/>
      <rect class="bar" x="170" y="50"  width="22" height="120" style="animation-delay:.6s"/>
      <rect class="bar" x="204" y="66"  width="22" height="104" style="animation-delay:.7s"/>
      <rect class="bar" x="238" y="38"  width="22" height="132" style="animation-delay:.8s"/>
      <rect class="bar" x="272" y="58"  width="22" height="112" style="animation-delay:.9s"/>
      <rect class="bar" x="306" y="28"  width="22" height="142" style="animation-delay:1s"/>
    </g>
    <polyline class="line" points="11,150 45,128 79,138 113,104 147,116 181,82 215,98 249,70 283,90 317,60"/>
    <circle class="dot" cx="317" cy="60" r="5"/>
  </g>

  <!-- title block -->
  <text class="title" x="60" y="104">Supply Chain Control Tower</text>
  <text class="subtitle" x="62" y="140">Prevision de demande · Optimisation des stocks · Alertes rupture &amp; surstock</text>

  <!-- stack tags -->
  <g transform="translate(62,168)">
    <g>
      <rect width="92" height="26" rx="13" fill="#CCFBF1"/>
      <text class="tag" x="46" y="17" text-anchor="middle">pandas</text>
    </g>
    <g transform="translate(102,0)">
      <rect width="92" height="26" rx="13" fill="#CCFBF1"/>
      <text class="tag" x="46" y="17" text-anchor="middle">LightGBM</text>
    </g>
    <g transform="translate(204,0)">
      <rect width="92" height="26" rx="13" fill="#CCFBF1"/>
      <text class="tag" x="46" y="17" text-anchor="middle">SARIMA</text>
    </g>
    <g transform="translate(306,0)">
      <rect width="108" height="26" rx="13" fill="#CCFBF1"/>
      <text class="tag" x="54" y="17" text-anchor="middle">Plotly Dash</text>
    </g>
  </g>
</svg>
